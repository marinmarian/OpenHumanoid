services:
  localization:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fast_lio_loc
    network_mode: host        # enable on Linux instead of ports mapping
    privileged: true
    environment:
      - DISPLAY=$DISPLAY
      - ROS_DOMAIN_ID=0
    volumes:
      # Mount map data so you can swap maps without rebuilding
      - ./data:/root/ws_loc/src/FAST_LIO_LOCALIZATION_HUMANOID/data
      # Mount Livox config so changes don't require rebuild
      - ./livox_ros_driver2/config:/root/ws_livox/install/livox_ros_driver2/share/livox_ros_driver2/config
      # Mount bags folder (create it, drop rosbags there)
      - ./bags:/root/bags
      # X11 forwarding for rviz (macOS: use XQuartz)
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash

  # ---- FoundationPoseROS2 — 6D object pose estimation ------
  # Requires: NVIDIA GPU + nvidia-container-toolkit on the host.
  # This service is behind a "gpu" profile — it does NOT build
  # with the default `docker compose build`.
  #
  # Build & run on a Linux GPU machine:
  #   docker compose --profile gpu build foundationpose
  #   docker compose --profile gpu up -d foundationpose
  # -----------------------------------------------------------
  foundationpose:
    profiles: ["gpu"]
    build:
      context: ./foundationpose
      dockerfile: Dockerfile
    container_name: foundation_pose
    # network_mode: host   # enable on Linux for DDS autodiscovery
    privileged: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - ROS_DOMAIN_ID=0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      # Object mesh models (.obj / .stl) for detection
      - ./foundationpose/demo_data:/app/FoundationPoseROS2/demo_data
      # X11 forwarding
      - /tmp/.X11-unix:/tmp/.X11-unix
    stdin_open: true
    tty: true
    command: bash
